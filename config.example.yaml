# OmniStore 配置示例（README §4.3）
# 配置优先级：程序默认值 < YAML 配置文件 < 环境变量（OMNISTORE_ 前缀）
# 修改后需重启服务，不支持热加载。

server:
  http_addr: "0.0.0.0:8080"
  public_url: "https://store.example.com"
  trusted_proxies:
    - "127.0.0.1"
    - "172.16.0.0/12"
  # S3 为 V1.1 规划，MVP 不启动
  s3_addr: "0.0.0.0:8081"
  s3_enabled: false

data:
  dir: "/data"

database:
  path: "" # 为空时使用 data.dir/omnistore.db

security:
  cookie_secure: true
  session_ttl_hours: 168

upload:
  max_file_size_mb: 1024

image_bed:
  root_path: "/images"
  user_max_file_size_mb: 20
  anonymous_max_file_size_mb: 10
  anonymous_rate_limit:
    enabled: true
    per_ip_per_hour: 60

audit:
  enabled: true
  max_entries: 10000

log:
  level: "info"
